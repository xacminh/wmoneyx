<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác minh Nhiệm vụ - wmoneyX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Quicksand', sans-serif; background-color: #fff; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #fff0f5 0%, #f0faff 100%); }
        .main-wrapper { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
        .logo-header { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; position: relative; display: inline-block; background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: led-text-flow 3s linear infinite, neonPulse 2s infinite ease-in-out; filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.5)); }
        @keyframes led-text-flow { to { background-position: 200% center; } }
        @keyframes neonPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .cute-animal-box { font-size: 4rem; margin-bottom: 10px; display: inline-block; animation: animalBounce 2s infinite ease-in-out; }
        @keyframes animalBounce { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        .content-full { width: 100%; max-width: 800px; text-align: center; transition: all 0.5s ease; }
        .time-badge { background: #ff00ff; color: white; padding: 8px 20px; border-radius: 50px; font-weight: 700; display: inline-block; margin-bottom: 20px; font-size: 0.85rem; box-shadow: 0 5px 15px rgba(255, 0, 255, 0.4); border: 2px solid #fff; }
        .btn-action { background: white; border: 1px solid #ffb3ff; border-radius: 20px; padding: 18px; margin-bottom: 20px; font-weight: 700; color: #b300b3; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; font-size: 1.05rem; transition: all 0.3s; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(255, 0, 255, 0.05); }
        .btn-action::after { content: ''; position: absolute; bottom: 0; left: -100%; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #ff00ff, #00ffff, #ff00ff, transparent); animation: led-line 3s linear infinite; }
        @keyframes led-line { 0% { left: -100%; } 100% { left: 100%; } }
        .btn-action:hover { transform: translateY(-4px); background: #fffafa; box-shadow: 0 10px 25px rgba(255, 0, 255, 0.15); }
        .btn-primary-custom { border: none !important; background: #ff00ff !important; color: white !important; }
        .input-mega { width: 100%; padding: 15px; border: 3px solid #ffb3ff; border-radius: 20px; margin: 10px 0; outline: none; font-size: 1.1rem; font-weight: 700; color: #ff00ff; background: #fff; text-align: center; transition: 0.3s; }
        .btn-send-mega { background: linear-gradient(90deg, #ff00ff, #d600d6); color: white; width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; box-shadow: 0 8px 0px #990099; cursor: pointer; transition: 0.2s; }
        .btn-send-mega:active { transform: translateY(4px); box-shadow: 0 4px 0px #990099; }
        .footer-info { margin-top: 20px; padding: 15px; background: #fff5ff; border-radius: 15px; border: 2px dashed #ff00ff; color: #666; max-width: 500px; margin-left: auto; margin-right: auto; }
        .copyright-text { margin-top: 40px; font-size: 0.85rem; font-weight: 700; color: #ff00ff; opacity: 0.9; }
        .back-link { margin-top: 20px; font-weight: 700; color: #ff00ff; cursor: pointer; padding: 8px 20px; background: white; border: 1px solid #ffb3ff; border-radius: 50px; display: inline-block; }
        .step-card { background: #fff; border: 1px solid #ffb3ff; border-left: 6px solid #ff00ff; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; color: #444; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="main-wrapper">
        <div class="logo-header">WMONEYX</div>

        <!-- TRANG ĐĂNG NHẬP (LẤY UUID TỪ PROFILES) -->
        <div id="auth-page" class="content-full">
            <div id="datetime-auth" class="time-badge">...</div>
            <div class="cute-animal-box">🔐</div>
            <h2 class="text-xl font-black text-pink-600 mb-2 uppercase">Xác thực tài khoản</h2>
            <p class="text-gray-500 text-sm mb-6 px-4">Nhập Email đăng ký wmoneyX của bạn.</p>
            <div class="max-w-md mx-auto">
                <input type="email" id="init-email" class="input-mega" placeholder="Nhập Email của bạn...">
                <button onclick="unlockApp()" id="btn-login" class="btn-send-mega mt-2">BẮT ĐẦU NGAY</button>
            </div>
        </div>

        <!-- TRANG CHỦ -->
        <div id="home-page" class="content-full" style="display: none;">
            <div id="datetime" class="time-badge">...</div>
            <div class="cute-animal-box">🐼</div>
            <p class="text-pink-600 font-bold mb-2 italic">Xin chào: <span id="display-email" class="underline"></span></p>
            <div class="grid grid-cols-1 gap-1 max-w-md mx-auto">
                <button onclick="showVerifyPage('Google Map')" class="btn-action">
                    <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_128dp.png" class="w-6" alt="google">
                    Xác minh Review Google Map
                </button>
                <button onclick="showVerifyPage('Tripadvisor')" class="btn-action">
                    <i class="fa-solid fa-plane-departure text-blue-500 text-xl"></i>
                    Xác minh Review Tripadvisor
                </button>
                <button onclick="showVerifyPage('App')" class="btn-action btn-primary-custom">
                    <i class="fa-solid fa-gift text-xl text-white"></i>
                    Xác minh Tải & Review App
                </button>
            </div>
            <button onclick="resetEmail()" class="text-[10px] text-gray-400 mt-10 hover:text-red-500 underline">Đăng xuất</button>
        </div>

        <!-- TRANG GỬI MINH CHỨNG -->
        <div id="verify-page" class="content-full" style="display: none;">
            <h2 id="verify-title" class="text-2xl font-black text-[#ff00ff] mb-6 uppercase italic">GỬI MINH CHỨNG</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4 max-w-2xl mx-auto">
                <div class="step-card">
                    <div class="font-black text-[#ff00ff] text-sm">BƯỚC 1</div>
                    <div class="text-[11px] font-bold" id="step1-text">Copy link bài đánh giá</div>
                </div>
                <div class="step-card">
                    <div class="font-black text-[#ff00ff] text-sm">BƯỚC 2</div>
                    <div class="text-[11px] font-bold">Dán vào ô bên dưới</div>
                </div>
                <div class="step-card">
                    <div class="font-black text-[#ff00ff] text-sm">BƯỚC 3</div>
                    <div class="text-[11px] font-bold">Bấm "Xác nhận gửi"</div>
                </div>
            </div>
            <div class="max-w-md mx-auto">
                <input type="text" id="task-link" class="input-mega" placeholder="Dán link tại đây...">
                <button onclick="sendToAdmin()" id="btn-send" class="btn-send-mega mt-4">XÁC NHẬN GỬI</button>
            </div>
            <div class="back-link" onclick="showHomePage()"><i class="fa-solid fa-chevron-left"></i> Quay lại</div>
        </div>

        <div class="copyright-text">© 2026 Developed by HOANG MAI ANH VU</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kblrdjxvsagdfjstchwp.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtibHJkanh2c2FnZGZqc3RjaHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODI1OTAsImV4cCI6MjA4OTc1ODU5MH0.SA7S3BmghnpLb2lXgpfU1aZ--1nFUAWEx6Tyr2iOGm4';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let scene, camera, renderer, crystals = [], particles;
        let selectedType = "";
        let savedEmail = localStorage.getItem('wmoney_user_email');
        let savedUserId = localStorage.getItem('wmoney_user_id');

        async function unlockApp() {
            const email = document.getElementById('init-email').value.trim();
            if(!email || !email.includes('@')) { alert('Vui lòng nhập Email hợp lệ!'); return; }
            const btn = document.getElementById('btn-login');
            btn.innerHTML = 'ĐANG KIỂM TRA...'; btn.disabled = true;

            try {
                const { data, error } = await _supabase.from('profiles').select('id, email').eq('email', email).single();
                if (error || !data) {
                    alert('Email này chưa đăng ký trên hệ thống!');
                    btn.innerHTML = 'BẮT ĐẦU NGAY'; btn.disabled = false;
                    return;
                }
                localStorage.setItem('wmoney_user_email', data.email);
                localStorage.setItem('wmoney_user_id', data.id);
                savedEmail = data.email;
                savedUserId = data.id;
                checkAuth();
            } catch (err) {
                alert('Lỗi kết nối!');
                btn.innerHTML = 'BẮT ĐẦU NGAY'; btn.disabled = false;
            }
        }

        function checkAuth() {
            if(savedEmail && savedUserId) {
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('home-page').style.display = 'block';
                document.getElementById('display-email').innerText = savedEmail;
            } else {
                document.getElementById('auth-page').style.display = 'block';
                document.getElementById('home-page').style.display = 'none';
            }
        }

        function resetEmail() {
            if(confirm('Bạn muốn đăng xuất?')) {
                localStorage.removeItem('wmoney_user_email');
                localStorage.removeItem('wmoney_user_id');
                window.location.reload();
            }
        }

        function init3DBg() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            const crystalGeo = new THREE.OctahedronGeometry(1, 0);
            const crystalMat = new THREE.MeshPhongMaterial({ color: 0xff00ff, transparent: true, opacity: 0.15, wireframe: true });
            for(let i=0; i<25; i++) {
                let crystal = new THREE.Mesh(crystalGeo, crystalMat);
                crystal.position.set(Math.random()*60-30, Math.random()*60-30, Math.random()*30-15);
                scene.add(crystal); crystals.push(crystal);
            }
            const pGeo = new THREE.BufferGeometry();
            let pCoords = [];
            for(let i=0; i<500; i++) { pCoords.push(Math.random()*100-50, Math.random()*100-50, Math.random()*100-50); }
            pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pCoords, 3));
            particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x00ffff, size: 0.1, transparent: true, opacity: 0.4 }));
            scene.add(particles);
            scene.add(new THREE.AmbientLight(0xffffff, 1));
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            crystals.forEach(c => { c.rotation.x += 0.005; c.rotation.y += 0.003; });
            particles.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }

        function showVerifyPage(type) {
            selectedType = type;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('verify-page').style.display = 'block';
            document.getElementById('verify-title').innerText = "XÁC MINH " + type;
            document.getElementById('task-link').value = '';
            document.getElementById('step1-text').innerText = (type === 'App') ? "Copy link App/Mã giới thiệu" : "Copy link bài đánh giá";
            window.scrollTo(0,0);
        }

        function showHomePage() {
            document.getElementById('verify-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
        }

        async function sendToAdmin() {
            const link = document.getElementById('task-link').value.trim();
            if(!link || !link.startsWith('http')) { alert('Vui lòng dán đúng Link minh chứng!'); return; }
            const btn = document.getElementById('btn-send');
            btn.innerHTML = 'ĐANG GỬI...'; btn.disabled = true;

            try {
                // CHÈN DỮ LIỆU ĐÚNG THEO CẤU TRÚC BẢNG TRONG ẢNH
                const { error } = await _supabase.from('special_task_submissions').insert([{ 
                    user_id: savedUserId,
                    email: savedEmail,
                    task_type: selectedType, 
                    review_link: link, 
                    status_1: 'pending',
                    created_at: new Date().toISOString()
                }]);

                if (error) throw error;
                confetti({ particleCount: 150, spread: 70, colors: ['#ff00ff', '#00ffff'] });
                btn.innerHTML = 'GỬI THÀNH CÔNG!';
                setTimeout(() => { 
                    alert('Gửi thành công! Vui lòng chờ phê duyệt.'); 
                    window.location.href = 'https://wmoney-x.vercel.app/'; 
                }, 1500);
            } catch (err) {
                alert('Lỗi: ' + err.message);
                btn.innerHTML = 'XÁC NHẬN GỬI'; btn.disabled = false;
            }
        }

        window.onload = () => {
            init3DBg(); animate3D(); checkAuth();
            setInterval(() => { 
                const now = new Date().toLocaleString('vi-VN');
                if(document.getElementById('datetime')) document.getElementById('datetime').innerText = now;
                if(document.getElementById('datetime-auth')) document.getElementById('datetime-auth').innerText = now;
            }, 1000);
        };
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
